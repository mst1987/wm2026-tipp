services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-wm2026}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wm2026}
      POSTGRES_DB:       ${POSTGRES_DB:-wm2026}
    # Kein Host-Port hier: auf dem Server verbindet sich das Backend intern
    # über das Docker-Netz (postgres:5432). Für lokale Entwicklung fügt
    # docker-compose.override.yml den Host-Port 5432 hinzu.
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-wm2026}']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-wm2026}:${POSTGRES_PASSWORD:-wm2026}@postgres:5432/${POSTGRES_DB:-wm2026}
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data:
