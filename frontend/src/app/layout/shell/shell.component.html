<div class="app-layout">
  <nav class="navbar">
    <a routerLink="/" class="brand">
      <span class="brand-icon">🏆</span>
      <span class="brand-text">WM 2026</span>
    </a>

    <div class="nav-links" [class.open]="menuOpen">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}" (click)="menuOpen = false">Dashboard</a>
      <a routerLink="/matches" routerLinkActive="active" (click)="menuOpen = false">Spiele</a>
      <a routerLink="/groups" routerLinkActive="active" (click)="menuOpen = false">Gruppen</a>
      <a routerLink="/knockout" routerLinkActive="active" (click)="menuOpen = false">K.O.-Runden</a>
      <a routerLink="/standings" routerLinkActive="active" (click)="menuOpen = false">Rangliste</a>
      <a routerLink="/rules" routerLinkActive="active" (click)="menuOpen = false">Regeln & Pot</a>
      <a routerLink="/admin" routerLinkActive="active" (click)="menuOpen = false" *ngIf="auth.currentUser()?.username === 'devihra'">⚙️ Admin</a>
    </div>

    <div class="nav-right">
      <ng-container *ngIf="auth.currentUser() as user">
        <img [src]="auth.avatarUrl(user)" [alt]="user.username" class="user-avatar" />
        <span class="user-name">{{ user.username }}</span>
        <button class="btn-logout" (click)="auth.logout()" title="Abmelden">↪</button>
      </ng-container>

      <button class="btn-login" (click)="auth.loginWithDiscord()" *ngIf="!auth.currentUser() && !auth.isLoading()">
        Anmelden
      </button>
    </div>

    <button class="hamburger" (click)="menuOpen = !menuOpen">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <main class="main-content">
    <router-outlet />
  </main>
</div>
