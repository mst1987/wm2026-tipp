<section class="card live-board">
  <div class="lb-head">
    <h3 class="card-title"><span class="live-dot"></span> Live-Rangliste</h3>
    <span class="lb-hint" *ngIf="liveMatch as lm">
      <img *ngIf="lm.teamHomeLogo" [src]="lm.teamHomeLogo" [alt]="lm.teamHome" class="hint-flag" />
      {{ lm.scoreHome ?? 0 }}:{{ lm.scoreAway ?? 0 }}
      <img *ngIf="lm.teamAwayLogo" [src]="lm.teamAwayLogo" [alt]="lm.teamAway" class="hint-flag" />
    </span>
  </div>

  <div class="lb-list">
    <div *ngFor="let s of entries" class="lb-row" [class.me]="currentUserId === s.id" [class.top]="s.rank <= 3">
      <span class="rank">{{ rankMedal(s.rank) }}</span>
      <img [src]="avatarUrl(s)" [alt]="s.username" class="avatar" />
      <span class="name">
        {{ s.username }}
        <span class="you" *ngIf="currentUserId === s.id">(Du)</span>
      </span>

      <!-- Abgegebener Tipp fürs Live-Spiel (mit Flaggen) -->
      <span class="tip" *ngIf="liveMatch as lm">
        <ng-container *ngIf="tipFor(s) as t">
          <img *ngIf="lm.teamHomeLogo" [src]="lm.teamHomeLogo" [alt]="lm.teamHome" class="tip-flag" />
          <span class="tip-score" [class]="pointsClass(t.points)">{{ t.predictedHome }}:{{ t.predictedAway }}</span>
          <img *ngIf="lm.teamAwayLogo" [src]="lm.teamAwayLogo" [alt]="lm.teamAway" class="tip-flag" />
        </ng-container>
        <span class="no-tip" *ngIf="!tipFor(s)">kein Tipp</span>
      </span>

      <span class="live-delta" *ngIf="s.livePoints > 0">+{{ s.livePoints }}</span>
      <span class="pts">{{ s.totalPoints }}</span>
    </div>

    <div class="lb-empty" *ngIf="entries.length === 0">
      Noch keine Teilnehmer in der Wertung.
    </div>
  </div>

  <a routerLink="/standings" class="card-link">Vollständige Rangliste →</a>
</section>
