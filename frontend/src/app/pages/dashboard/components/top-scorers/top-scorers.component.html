<section class="card scorers-card">
  <h3 class="card-title">👟 Torschützen & Scorer</h3>
  <div class="scorers-empty" *ngIf="scorers.length === 0">Noch keine Torschützen.</div>
  <table class="scorers-table" *ngIf="scorers.length > 0">
    <thead>
      <tr>
        <th class="c-rank">#</th>
        <th class="c-player">Spieler</th>
        <th class="c-num" title="Tore">⚽</th>
        <th class="c-num" title="Vorlagen">🅰️</th>
        <th class="c-num" title="Scorerpunkte (Tore + Vorlagen)">Σ</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let s of scorers; let i = index">
        <td class="c-rank">{{ i + 1 }}</td>
        <td class="c-player">
          <span class="sc-name">{{ s.player }}</span>
          <span class="sc-team" *ngIf="s.team">{{ s.team }}</span>
        </td>
        <td class="c-num">{{ s.goals }}</td>
        <td class="c-num">{{ s.assists }}</td>
        <td class="c-num c-total">{{ s.points }}</td>
      </tr>
    </tbody>
  </table>
</section>
