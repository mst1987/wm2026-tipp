<div class="dashboard">

  <!-- Willkommen (eigener Container) -->
  <div class="welcome-card" *ngIf="auth.currentUser() as user">
    <img [src]="auth.avatarUrl(user)" [alt]="user.username" class="welcome-avatar" />
    <span class="welcome-text">Willkommen zurück, <strong>{{ user.username }}</strong>! 👋</span>
  </div>

  <!-- Live-Spiel direkt unter dem Willkommen -->
  <app-live-match-card *ngIf="liveMatch() as lm" [match]="lm" [details]="liveDetails()" />

  <!-- Live-Rangliste während laufender Spiele -->
  <app-live-leaderboard
    *ngIf="liveMatch() && liveStandings().length > 0"
    [entries]="liveStandings()"
    [currentUserId]="auth.currentUser()?.id ?? null"
  />

  <!-- Hero / Titel als (kompakter) Container -->
  <section class="hero-card">
    <div class="hero-title">
      <span class="trophy">🏆</span>
      <h1>WM 2026 Tippspiel</h1>
    </div>

    <app-pot-card *ngIf="!loading()" [paidCount]="paidCount()" />

    <div class="hero-actions" *ngIf="!auth.isLoggedIn && !auth.isLoading()">
      <button class="btn-discord" (click)="auth.loginWithDiscord()">
        <svg width="18" height="18" viewBox="0 0 127.14 96.36" fill="currentColor">
          <path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5-12.74,11.44-12.74S96.23,46,96.12,53,91.08,65.69,84.69,65.69Z"/>
        </svg>
        Jetzt mit Discord anmelden
      </button>
    </div>
  </section>

  <app-rules-card />

  <!-- Hinweis: offene Tipps -->
  <a routerLink="/matches" class="tip-reminder" *ngIf="auth.isLoggedIn && !loading() && untippedCount() > 0">
    <span class="tr-icon">⚽</span>
    <span class="tr-text">
      Du hast <strong>{{ untippedCount() }}</strong>
      {{ untippedCount() === 1 ? 'Spiel' : 'Spiele' }} noch nicht getippt!
    </span>
    <span class="tr-cta">Jetzt tippen →</span>
  </a>

  <!-- Quick Links -->
  <div class="quick-links">
    <a routerLink="/matches" class="quick-link">
      <span class="ql-icon">⚽</span>
      <span class="ql-text">
        <strong>Spiele & Tipps</strong>
        <small>Jetzt tippen</small>
      </span>
    </a>
    <a routerLink="/groups" class="quick-link">
      <span class="ql-icon">🗂️</span>
      <span class="ql-text">
        <strong>Gruppen</strong>
        <small>Tabellen & Spieltage</small>
      </span>
    </a>
    <a routerLink="/standings" class="quick-link">
      <span class="ql-icon">📊</span>
      <span class="ql-text">
        <strong>Rangliste</strong>
        <small>Wer führt?</small>
      </span>
    </a>
  </div>

  <div class="grid" *ngIf="!loading()">
    <app-leaderboard-preview [entries]="top5()" [currentUserId]="auth.currentUser()?.id ?? null" />
    <app-upcoming-matches [matches]="upcoming()" />
  </div>

  <!-- Letzte Ergebnisse (links) + Torschützen (rechts, kompakt) -->
  <div class="grid" *ngIf="!loading() && (recent().length > 0 || scorers().length > 0)">
    <app-recent-results [matches]="recent()" />
    <app-top-scorers [scorers]="scorers()" />
  </div>

  <div class="loading" *ngIf="loading()">Lade Daten...</div>
</div>
